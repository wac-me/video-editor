<!doctype html>
<html lang="pl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Video Editor V2</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<header><h1>Video Editor V2</h1></header>
<div class="app">
<div class="preview">
<input type="file" id="videoInput" accept="video/*">
<video
    id="video"
    playsinline
    muted
    preload="auto"
    style="position:absolute;width:1px;height:1px;opacity:0;"
    

    
</video>
<canvas id="canvas"></canvas>
<div class="timeline">
Start <input id="trimStart" type="number" value="0" step="0.1">
End <input id="trimEnd" type="number" value="0" step="0.1">
Speed <input id="speed" type="number" value="1" step="0.25" min="0.25" max="3">
</div>
</div>
<div class="side">
<select id="crop">
<option>Original</option><option>9:16</option><option>1:1</option><option>16:9</option>
</select>
<input id="brightness" type="range" min="0" max="200" value="100">
<input id="contrast" type="range" min="0" max="200" value="100">
<input id="saturation" type="range" min="0" max="300" value="100">
<input id="captionText" placeholder="Napis">
<input id="capStart" type="number" placeholder="start" step="0.1">
<input id="capEnd" type="number" placeholder="end" step="0.1">
<button id="addCaption">Dodaj napis</button>
<button id="saveProject">Zapisz JSON</button>
<input id="loadProject" type="file" accept=".json">
<button id="exportBtn">Export WebM</button>
</div>
</div>
<script type="module" src="js/app.js"></script>
</body></html>
