<!doctype html>
<html lang="pl">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EV Video Editor</title>

<link rel="stylesheet" href="css/app.css">

</head>


<body>


<div class="app start-mode">


<header>


<div class="logo">

<img 
class="logo-full"
src="assets/VE_video_editor_camera_logo.svg">

<img 
class="logo-icon"
src="assets/VE_video_editor_app_icon.svg">

</div>



<div 
class="menu"
onclick="goBack()">

☰

</div>


</header>





<section id="start" class="screen active">


<button class="upload">


<i data-lucide="upload-cloud"></i>


<span>
Upload video
</span>


<span>
or project
</span>


</button>


</section>





<section id="editor" class="screen">


<div class="canvas">

VIDEO FRAME

</div>



<div class="bottom">


<button 
class="tool-btn"
onclick="showScreen('cut')">

<i data-lucide="scissors"></i>

<span>
CUT
</span>

</button>




<button
class="tool-btn"
onclick="showScreen('text')">


<i data-lucide="type"></i>


<span>
TEXT
</span>


</button>





<button
onclick="showScreen('export')">


<i data-lucide="save"></i>


<span>
SAVE
</span>


</button>


</div>


</section>




<!-- CUT -->

<section id="cut" class="screen">


<div class="canvas">

VIDEO

</div>



<div class="timeline">

VIDEO TIMELINE

</div>



<div class="tools">


<button class="tool-btn active">


<i data-lucide="clock"></i>


<span>
Speed
</span>


</button>




<button class="tool-btn">


<i data-lucide="sliders-horizontal"></i>


<span>
Adjust
</span>


</button>




<button class="tool-btn">


<i data-lucide="sparkles"></i>


<span>
FX
</span>


</button>



</div>


</section>



<section id="text" class="screen">


<div class="canvas">


VIDEO

<br>


<span class="caption">
TEST
</span>


</div>



<div class="timeline">

TEXT TIMELINE

</div>



<div class="tools">


<button class="tool-btn active">


<i data-lucide="plus"></i>


<span>
Add
</span>


</button>



<button class="tool-btn">


<i data-lucide="type"></i>


<span>
Font
</span>


</button>



<button class="tool-btn">


<i data-lucide="sparkles"></i>


<span>
FX
</span>


</button>



</div>



</section>









<section id="text" class="screen">


<div class="canvas">


VIDEO

<br>


<span class="caption">
TEST
</span>


</div>



<div class="timeline">

TEXT TIMELINE

</div>



<div class="tools">


<button class="tool-btn active">


<i data-lucide="plus"></i>


<span>
Add
</span>


</button>



<button class="tool-btn">


<i data-lucide="type"></i>


<span>
Font
</span>


</button>



<button class="tool-btn">


<i data-lucide="sparkles"></i>


<span>
FX
</span>


</button>



</div>



</section>









<section id="export" class="screen">


<h2>
Export
</h2>


<label>

<input type="radio" name="format">

WEBM

</label>



<label>

<input type="radio" name="format">

MP4

</label>



<button class="export">

EXPORT

</button>



</section>





</div>




<script src="https://unpkg.com/lucide@latest"></script>

<script src="js/ui.js"></script>


</body>

</html>
