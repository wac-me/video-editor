<!doctype html>
<html lang="pl">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EV Video Editor UI</title>

<link rel="stylesheet" href="css/app.css">

</head>


<body>


<div class="app">


<header>


<div class="logo">


<img 
class="logo-full"
src="assets/logo-full.svg">


<img 
class="logo-icon"
src="assets/logo-icon.svg">


</div>



<div class="menu">
☰
</div>


</header>





<!-- START -->


<section id="start" class="screen active">


<button class="upload">


<i 
data-lucide="upload"
class="upload-icon">
</i>


<span>
Upload video
</span>


<span>
or project
</span>


</button>


</section>








<!-- EDITOR -->


<section id="editor" class="screen">


<div class="canvas">

VIDEO FRAME

</div>



<div class="bottom">


<button onclick="showScreen('cut')">


<i data-lucide="scissors"></i>

<span>
CUT
</span>


</button>





<button onclick="showScreen('text')">


<i data-lucide="type"></i>

<span>
TEXT
</span>


</button>





<button onclick="showScreen('export')">


<i data-lucide="save"></i>

<span>
SAVE
</span>


</button>


</div>


</section>








<!-- CUT -->


<section id="cut" class="screen">


<div class="canvas">

VIDEO

</div>



<div class="timeline">

━━━━━━━━━━

</div>




<div class="tools">


<button>

<i data-lucide="clock"></i>

<span>
Speed
</span>

</button>



<button>

<i data-lucide="sliders"></i>

<span>
Adjust
</span>

</button>



<button>

<i data-lucide="sparkles"></i>

<span>
FX
</span>

</button>



</div>


</section>








<!-- TEXT -->


<section id="text" class="screen">


<div class="canvas">


VIDEO


<br>


<span class="caption">
TEST
</span>


</div>



<div class="timeline">

━━━━━━━━━━

</div>




<div class="tools">


<button>

<i data-lucide="plus"></i>

<span>
Add
</span>

</button>




<button>

<i data-lucide="type"></i>

<span>
Font
</span>

</button>





<button>

<i data-lucide="sparkles"></i>

<span>
FX
</span>

</button>


</div>


</section>








<!-- EXPORT -->


<section id="export" class="screen">


<h2>
Export
</h2>


<label>

<input type="radio" name="format">

WEBM

</label>



<label>

<input type="radio" name="format">

MP4

</label>



<button class="export">

EXPORT

</button>


</section>




</div>





<script src="https://unpkg.com/lucide@latest"></script>

<script src="js/ui.js"></script>


<script>

lucide.createIcons();

</script>



</body>

</html>
