<!doctype html>
<html lang="pl">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EV Video Editor</title>

<link rel="stylesheet" href="css/app.css">

</head>


<body>

<div class="ve-app">

    <!-- TOP BAR -->
    <header class="top-bar">

        <div class="brand">
            VE
        </div>

        <div class="top-actions">
            ☰
        </div>

    </header>


    <!-- WORKSPACE -->
    <main class="workspace">


        <!-- VIDEO PREVIEW -->
        <section class="preview-area">

            <div class="video-frame">
                <span>
                    16:9 VIDEO FRAME
                </span>
            </div>

        </section>



        <!-- TIMELINE -->
        <section class="timeline-area">

            <div class="timeline-container">

                <div class="track video">
                    VIDEO
                </div>

                <div class="track text">
                    TEXT
                </div>

                <div class="track audio">
                    AUDIO
                </div>

            </div>

        </section>


    </main>



    <!-- MAIN BAR -->
    <nav class="main-bar">

        <button class="tool active">
            🎥
            <span>VIDEO</span>
        </button>


        <button class="tool">
            T
            <span>TEXT</span>
        </button>


        <button class="tool">
            ♪
            <span>AUDIO</span>
        </button>

    </nav>


</div>


</body>

</html>
