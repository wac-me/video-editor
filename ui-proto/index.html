<!doctype html>
<html lang="pl">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EV Video Editor UI</title>

<link rel="stylesheet" href="css/app.css">

</head>


<body>


<div class="app start-mode" id="app">


<header>

<div class="logo">

<img 
src="assets/VE_video_editor_camera_logo.svg"
class="logo-full">

<img 
src="assets/VE_video_editor_app_icon.svg"
class="logo-icon">

</div>


<div class="menu" onclick="goBack()">

<i data-lucide="text-align-end"></i>

</div>

</header>




<section id="start" class="screen active">


<button class="upload">

<i  class="upload-icon" data-lucide="arrow-big-up-dash"></i>

<span>
Upload video
<br>
or project
</span>

</button>


</section>





<section id="editor" class="screen">


<div class="canvas">

VIDEO FRAME

</div>



<div class="bottom">


<button onclick="showScreen('cut')">

<i data-lucide="clapperboard"></i>

<span>
CUT
</span>

</button>



<button onclick="showScreen('text')">

<i data-lucide="type-outline"></i>

<span>
TEXT
</span>

</button>



<button onclick="showScreen('export')">

<i data-lucide="save"></i>

<span>
SAVE
</span>

</button>


</div>


</section>







<section id="cut" class="screen">


<div class="canvas">

VIDEO

</div>


<div class="timeline">

TIMELINE

</div>



<div class="tools">


<button class="active">

<i data-lucide="clock"></i>

<span>
Speed
</span>

</button>


<button>

<i data-lucide="sliders"></i>

<span>
Adjust
</span>

</button>


<button>

<i data-lucide="sparkles"></i>

<span>
FX
</span>

</button>





</div>


</section>







<section id="text" class="screen">


<div class="canvas">

VIDEO

<br>

<span class="caption">
TEST
</span>

</div>



<div class="timeline">

TEXT TIMELINE

</div>




<div class="tools">


<button class="active">

<i data-lucide="plus"></i>

<span>
Add
</span>

</button>



<button>

<i data-lucide="type"></i>

<span>
Font
</span>

</button>



<button>

<i data-lucide="sparkles"></i>

<span>
FX
</span>

</button>






</div>


</section>







<section id="export" class="screen">


<h2>
Export
</h2>



<label>

<input type="radio" name="format">

WEBM

</label>



<label>

<input type="radio" name="format">

MP4

</label>



<button class="export">

<i data-lucide="download"></i>

EXPORT

</button>



<button onclick="showScreen('editor')">

BACK

</button>


</section>




</div>




<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.js"></script>

<script src="js/ui.js"></script>

<script>

window.addEventListener(
"load",
()=>{

    if(window.lucide){

        lucide.createIcons();

    }

});

</script>

</body>

</html>
