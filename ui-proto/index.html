<!doctype html>
<html lang="pl">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EV Video Editor</title>

<link rel="stylesheet" href="css/app.css">

</head>


<body>


<div class="app start-mode">


<header>


<div class="logo">

<img 
class="logo-full"
src="assets/VE_video_editor_camera_logo.svg">

<img 
class="logo-icon"
src="assets/VE_video_editor_app_icon.svg">

</div>



<div 
class="menu"
onclick="goBack()">

 <i data-icon="menu"></i>

</div>


</header>





<section id="start" class="screen active">

<button 
class="upload"
onclick="showScreen('format')">

<i data-icon="video"></i>

<span data-label="makeVideo"></span>

</button>

</section>



<section id="format" class="screen">

<h2 data-label="formatTitle"></h2>

<button 
class="tool-btn active"
onclick="selectFormat('9:16')">

<span>
9:16
</span>

</button>


<button class="tool-btn">
16:9
</button>


<button class="tool-btn">
1:1
</button>


<button class="tool-btn">
4:5
</button>

</section>

<section id="editor" class="screen">


<div class="canvas">


    <div class="video-frame horizontal">


        <div class="video-placeholder">

            16:9 VIDEO FRAME

        </div>


    </div>


</div>



<div class="timeline">


    <div class="timeline-header">

        <span data-label="videoTimeline"></span>

        <div class="time">
            00:00
        </div>


    </div>



    <div class="timeline-area">


        <div class="timeline-row">


            div class="track-label" onclick="selectLayer('video')">

                VIDEO

            </div>


            <div class="timeline-track">

            </div>


        </div>




        <div class="timeline-row">


            div class="track-label" onclick="selectLayer('text')">

                TEXT

            </div>


            <div class="timeline-track">

            </div>


        </div>




        <div class="timeline-row">


            div class="track-label" onclick="selectLayer('video')">

                AUDIO

            </div>


            <div class="timeline-track">

            </div>


        </div>



        <div class="playhead"></div>


    </div>



</div>





<div class="tools">


<div id="addTools" class="tool-panel active">


<button class="tool-btn"
onclick="openEditorTool('video')">

<i data-icon="video"></i>
<span data-label="addVideo"></span>

</button>



<button class="tool-btn"
onclick="openEditorTool('text')">

<i data-icon="text"></i>
<span data-label="addText"></span>

</button>



<button class="tool-btn"
onclick="openEditorTool('audio')">

<i data-icon="audio"></i>
<span data-label="addAudio"></span>

</button>


</div>





<div id="videoTools" class="tool-panel">


<div class="tool-header">

<button onclick="cancelEditorTool()">
<i data-icon="close"></i>
</button>


<span>VIDEO</span>


<button onclick="confirmEditorTool()">
<i data-icon="check"></i>
</button>


</div>



<button class="tool-btn">
Speed
</button>

<button class="tool-btn">
Adjust
</button>

<button class="tool-btn">
FX
</button>


</div>





<div id="audioTools" class="tool-panel">

<div class="tool-header">

<button onclick="cancelEditorTool()">
<i data-icon="close"></i>
</button>


<span>AUDIO</span>


<button onclick="confirmEditorTool()">
<i data-icon="check"></i>
</button>

</div>


<button class="tool-btn">
Volume
</button>


<button class="tool-btn">
Fade
</button>


<button class="tool-btn">
FX
</button>


</div>

<div id="textTools" class="tool-panel">

  <div class="tool-header">
    <button onclick="cancelEditorTool()">
      <i data-icon="close"></i>
    </button>
    <span>TEXT</span>
    <button onclick="confirmEditorTool()">
      <i data-icon="check"></i>
    </button>
  </div>

  <button class="tool-btn">Font</button>
  <button class="tool-btn">Color</button>
  <button class="tool-btn">FX</button>

</div>




</div>



</section>





<section id="video" class="screen">

<div class="tool-header">

<button onclick="showScreen('editor')">
<i data-icon="close"></i>
</button>

<h2>VIDEO</h2>

<button onclick="showScreen('editor')">
<i data-icon="check"></i>
</button>

</div>

<div class="tools">

<button class="tool-btn">
<i data-icon="speed"></i>
<span data-label="speed"></span>
</button>

<button class="tool-btn">
<i data-icon="adjust"></i>
<span data-label="adjust"></span>
</button>

<button class="tool-btn">
<i data-icon="fx"></i>
<span data-label="fx"></span>
</button>

</div>

</section>


<section id="audio" class="screen">

<div class="tool-header">

<button onclick="showScreen('editor')">
<i data-icon="close"></i>
</button>

<h2>AUDIO</h2>

<button onclick="showScreen('editor')">
<i data-icon="check"></i>
</button>

</div>

<div class="tools">

<button class="tool-btn">
<i data-icon="audio"></i>
<span>Volume</span>
</button>

<button class="tool-btn">
<span>Fade</span>
</button>

<button class="tool-btn">
<i data-icon="fx"></i>
<span data-label="fx"></span>
</button>

</div>

</section>


<!-- CUT -->

<section id="cut" class="screen">


<div class="canvas">


    <div class="video-frame horizontal">

        <div class="video-placeholder">

            VIDEO

        </div>

    </div>


</div>




<div class="timeline">


    <div class="timeline-header">

        <span data-label="videoTimeline"></span>

        <div class="time" id="currentTime">
            00:00
        </div>

    </div>




    <div class="timeline-area">


        <div class="timeline-row">


            <div class="track-label">
                VIDEO
            </div>


            <div class="timeline-track">


                <div class="clip video-clip">
                    VIDEO
                </div>


            </div>


        </div>





        <div class="timeline-row">


            <div class="track-label">
                TEXT
            </div>


            <div class="timeline-track">


                <div class="clip text-clip">
                    TEST
                </div>


            </div>


        </div>



        
<div class="timeline-row">

<div class="track-label">
AUDIO
</div>

<div class="timeline-track">

</div>

</div>

<div class="playhead"></div>


    </div>



</div>





<div class="tools">


<button class="tool-btn active">


<i data-icon="speed"></i>

<span data-label="speed"></span>


</button>




<button class="tool-btn">


<i data-icon="adjust"></i>

<span data-label="adjust"></span>


</button>




<button class="tool-btn">


<i data-icon="fx"></i>

<span data-label="fx"></span>


</button>



</div>


</section>



<section id="text" class="screen">


<div class="canvas">


VIDEO

<br>


<span class="caption">
TEKST
</span>


</div>



<div class="timeline" data-label="textTimeline"></div>





<div class="tools">


<button class="tool-btn active">


<i data-icon="add"></i>


<span data-label="add"></span>


</button>



<button class="tool-btn">


<i data-icon="text"></i>


<span data-label="font"></span>


</button>



<button class="tool-btn">


<i data-icon="fx"></i>


<span data-label="fx"></span>


</button>



</div>



</section>



















<section id="export" class="screen">


<h2 data-label="exportTitle"></h2>


<label>

<input type="radio" name="format">

<span data-label="webm"></span>

</label>



<label>

<input type="radio" name="format">

<span data-label="mp4"></span>

</label>



<button class="export">

<span data-label="saveProject"></span>

</button>



</section>





</div>


<script src="https://unpkg.com/lucide@latest"></script>

<script src="js/icons.js"></script>

<script src="js/labels.js"></script>

<script src="js/theme.js"></script>

<script src="js/screens.js"></script>

<script src="js/timeline.js"></script>
<script src="js/layers.js"></script>
<script src="js/editor-tools.js"></script>

<script src="js/ui.js"></script>




</body>

</html>
