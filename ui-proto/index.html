<!doctype html>
<html lang="pl">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EV Video Editor</title>

<link rel="stylesheet" href="css/app.css">

</head>


<body>


<div class="app start-mode">


<header>


<div class="logo">

<img 
class="logo-full"
src="assets/VE_video_editor_camera_logo.svg">

<img 
class="logo-icon"
src="assets/VE_video_editor_app_icon.svg">

</div>



<div 
class="menu"
onclick="goBack()">

 <i data-icon="menu"></i>

</div>


</header>





<section id="start" class="screen active">


<button class="upload">


<i data-icon="upload"></i>


<span data-label="upload"></span>

<span data-label="uploadProject"></span>


</button>


</section>





<section id="editor" class="screen">


<div class="canvas">

VIDEO FRAME

</div>



<div class="bottom">


<button 
class="tool-btn"
onclick="showScreen('cut')">

<i data-icon="cut"></i>

<span data-label="cut"></span>

</button>


<button
class="tool-btn"
onclick="showScreen('text')">


<i data-icon="text"></i>


<span data-label="text"></span>


</button>





<button
onclick="showScreen('export')">


<i data-icon="save"></i>


<span data-label="save"></span>


</button>


</div>


</section>




<!-- CUT -->

<section id="cut" class="screen">


<div class="canvas">

VIDEO

</div>



<div class="timeline" data-label="videoTimeline"></div>



<div class="tools">


<button class="tool-btn active">


<i data-icon="speed"></i>


<span data-label="speed"></span>


</button>




<button class="tool-btn">


<i data-icon="adjust"></i>


<span data-label="adjust"></span>


</button>




<button class="tool-btn">


<i data-icon="fx"></i>


<span>
<span data-label="fx"></span>
</span>


</button>



</div>


</section>



<section id="text" class="screen">


<div class="canvas">


VIDEO

<br>


<span class="caption">
TEKST
</span>


</div>



<div class="timeline" data-label="textTimeline"></div>





<div class="tools">


<button class="tool-btn active">


<i data-icon="add"></i>


<span data-label="add"></span>


</button>



<button class="tool-btn">


<i data-icon="text"></i>


<span data-label="font"></span>


</button>



<button class="tool-btn">


<i data-icon="fx"></i>


<span data-label="fx"></span>


</button>



</div>



</section>



















<section id="export" class="screen">


<h2 data-label="exportTitle"></h2>


<label>

<input type="radio" name="format">

<span data-label="webm"></span>

</label>



<label>

<input type="radio" name="format">

<span data-label="mp4"></span>

</label>



<button class="export">

<span data-label="fx"></span>

</button>



</section>





</div>


<script src="https://unpkg.com/lucide@latest"></script>

<script src="js/icons.js"></script>

<script src="js/labels.js"></script>

<script src="js/theme.js"></script>

<script src="js/screens.js"></script>

<script src="js/ui.js"></script>




</body>

</html>
