<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EV Video Editor</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="app">

        <!-- Top Bar -->
        <header class="top-bar">
            <button class="icon-btn"><i class="fas fa-chevron-left"></i></button>
            <div class="project-title">Mój filmik</div>
            <button class="export-btn">Eksportuj</button>
        </header>

        <!-- Workspace -->
        <div class="workspace">

            <!-- Preview -->
            <div class="preview-container">
                <div class="video-frame">
                    <div class="video-placeholder">
                        <svg viewBox="0 0 9 16" class="placeholder-svg" preserveAspectRatio="xMidYMid meet">
                            <rect x="0.5" y="0.5" width="8" height="15" fill="none" stroke="#666" stroke-width="0.15" stroke-dasharray="0.4,0.2"/>
                            <text x="4.5" y="8" text-anchor="middle" dominant-baseline="middle" fill="#aaa" font-size="1.1" font-weight="700">9:16</text>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Resizer -->
<div class="resizer" id="resizer"></div>

<!-- Prosty timeline placeholder -->
<div class="timeline-placeholder">
    TIMELINE PLACEHOLDER (stała wysokość)
</div>

        <!-- Bottom Bar -->
        <div class="bottom-bar">
            <button><i class="fas fa-video"></i><span>Media</span></button>
            <button><i class="fas fa-font"></i><span>Tekst</span></button>
            <button><i class="fas fa-music"></i><span>Audio</span></button>
            <button><i class="fas fa-magic"></i><span>Efekty</span></button>
            <button><i class="fas fa-sliders-h"></i><span>Dostosuj</span></button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
