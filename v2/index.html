<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resizer Test - Poprawiony</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #0a0a0a;
            color: #eee;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .top {
            background: #111;
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .preview {
            flex: 0 0 320px;           /* rozsądna początkowa wysokość */
            min-height: 40px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-content {
            width: 85%;
            aspect-ratio: 9 / 16;
            background: #1e1e1e;
            border: 2px dashed #555;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 2rem;
        }
        .resizer {
            height: 20px;
            background: rgba(233, 30, 99, 0.4);
            cursor: ns-resize;
            position: relative;
        }
        .resizer::after {
            content: '≡';
            color: #e91e63;
            font-size: 1.8rem;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .timeline {
            flex-shrink: 0;
            height: 200px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 1.3rem;
        }
        .dock {
            background: #111;
            padding: 12px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="top">Top Bar</div>

    <div class="workspace">
        <div class="preview" id="preview">
            <div class="preview-content">9:16 Preview</div>
        </div>

        <div class="resizer" id="resizer"></div>

        <div class="timeline">TIMELINE (200px)</div>
    </div>

    <div class="dock">Dock</div>

    <script>
        const resizer = document.getElementById('resizer');
        const preview = document.getElementById('preview');

        let isResizing = false;

        resizer.addEventListener('mousedown', () => isResizing = true);
        resizer.addEventListener('touchstart', () => isResizing = true, { passive: true });

        const doResize = (clientY) => {
            if (!isResizing) return;
            const newH = clientY - 80;   // offset od góry ekranu
            if (newH > 40) {
                preview.style.flexBasis = newH + 'px';
            }
        };
