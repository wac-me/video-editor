<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EV Video Editor</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="app">

        <!-- Top Bar -->
        <header class="top-bar">
            <button class="icon-btn"><i class="fas fa-chevron-left"></i></button>
            <div class="project-title">Mój filmik</div>
            <button class="export-btn">Eksportuj</button>
        </header>

        <!-- Preview -->
<div class="preview-container">
    <div class="video-frame">
        <div class="video-placeholder">
            <svg viewBox="0 0 9 16" class="placeholder-svg" preserveAspectRatio="xMidYMid meet">
                <rect x="0.5" y="0.5" width="8" height="15" fill="none" stroke="#666" stroke-width="0.15" stroke-dasharray="0.4,0.2"/>
                <text x="4.5" y="8" text-anchor="middle" dominant-baseline="middle" fill="#aaa" font-size="1" font-weight="700">9:16</text>
            </svg>
        </div>
    </div>
</div>

<!-- Resizer -->
<div class="resizer" id="resizer"></div>



        <!-- Timeline -->
        <div class="timeline-container">
            <div class="timeline-header">
                <span>TIMELINE</span>
                <div class="timecode">00:00 / 00:42</div>
            </div>
            
            <div class="tracks">
                <!-- Warstwy -->
                <div class="track video-track">
                    <div class="track-label">VIDEO</div>
                    <div class="timeline-track">
                        <div class="clip video-clip">Główny klip</div>
                    </div>
                </div>
                <div class="track text-track">
                    <div class="track-label">TEXT</div>
                    <div class="timeline-track">
                        <div class="clip text-clip">Tytuł</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Bar -->
        <div class="bottom-bar">
            <button><i class="fas fa-video"></i><span>Media</span></button>
            <button><i class="fas fa-font"></i><span>Tekst</span></button>
            <button><i class="fas fa-music"></i><span>Audio</span></button>
            <button><i class="fas fa-magic"></i><span>Efekty</span></button>
            <button><i class="fas fa-sliders-h"></i><span>Dostosuj</span></button>
        </div>
    </div>

    <script src="js/main.js"></script>
    
</body>
</html>
