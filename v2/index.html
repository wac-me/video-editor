<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Video Editor v2</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="top-bar">
            <div class="logo">
                <span>EV Video Editor</span>
            </div>
            <div class="project-name">Nowy projekt 1</div>
        </header>

        <!-- Główny obszar -->
        <div class="main-content">
            <!-- Preview -->
            <div class="preview-area">
                <div class="video-frame">
                    <div class="placeholder">
                        <i class="fas fa-play-circle"></i>
                        <p>16:9 VIDEO FRAME</p>
                    </div>
                </div>
            </div>

            <!-- Tools -->
            <div class="tools-panel">
                <button onclick="addMedia('video')"><i class="fas fa-video"></i> Video</button>
                <button onclick="addMedia('text')"><i class="fas fa-font"></i> Text</button>
                <button onclick="addMedia('audio')"><i class="fas fa-music"></i> Audio</button>
            </div>
        </div>

        <!-- Timeline -->
        <div class="timeline-area">
            <div class="timeline-header">
                <span>TIMELINE</span>
            </div>
            <div class="timeline">
                <div class="empty-state">
                    <button onclick="addFirstClip()">+ Dodaj pierwsze media</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
